name: Publish Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # required for trusted publishers (oidc) on pypi

jobs:
  build_wheels:
    name: Build Python wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_ARCHS_MACOS: x86_64 arm64
          # skip: 32-bit targets (win32, i686) — __int128 and 64-bit intrinsics
          # are not available on MSVC x86 / manylinux i686 toolchains.
          # skip: pp* (PyPy) — not tested, skip cp38-macosx_arm64 (no runner).
          CIBW_SKIP: "pp* cp38-macosx_arm64 *-win32 *-manylinux_i686 *-musllinux_i686"
          CIBW_BUILD_VERBOSITY: 1

      - name: Build sdist
        if: matrix.os == 'ubuntu-latest'
        run: |
          pipx run build --sdist
          mv dist/*.tar.gz ./wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.os }}
          path: ./wheelhouse/*

  publish_pypi:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # if using trusted publishers, omit the password line completely
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish_npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@tiw302'
      
      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v14
        with:
          version: 'latest'
          actions-cache-folder: 'emsdk-cache'
      
      - name: Build WASM
        run: |
          cd js
          node build.js
          
      - name: Run JS Wrapper Tests
        run: |
          node tests/test_js.js
          
      - name: Publish to NPM
        run: |
          cp README.md js/
          cd js
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_cargo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Publish to crates.io
        run: |
          cp README.md rust/
          cp -r src rust/c_src
          cp -r include rust/c_include
          git add rust/c_src rust/c_include
          cd rust
          cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
